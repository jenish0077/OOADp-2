<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velour – Billing</title>
    <link rel="stylesheet" href="billing.css">
</head>
<body>

<aside class="sidebar">
    <div class="logo">Velour</div>
    <nav class="nav-menu">
        <div class="nav-item" onclick="window.location.href='dashboard.html'">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
            <span>Dashboard</span>
        </div>
        <div class="nav-item" onclick="window.location.href='products.html'">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
            <span>Products</span>
        </div>
        <div class="nav-item active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
            <span>Billing</span>
        </div>
        <div class="nav-item" onclick="window.location.href='sales.html'">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
            <span>Sales</span>
        </div>
        <div class="nav-item" onclick="window.location.href='report.html'">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
            <span>Report</span>
        </div>
    </nav>
    <div class="logout" id="logoutBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Logout</span>
    </div>
</aside>

<main class="main-content">

    <div class="header">
        <h1>Billing</h1>
        <div class="profile-wrapper">
            <div class="profile-icon" id="profileBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
            </div>
            <div class="profile-dropdown" id="profileDropdown">
                <div class="dropdown-user">
                    <div class="dropdown-avatar">A</div>
                    <div>
                        <div class="dropdown-name">Administrator</div>
                        <div class="dropdown-role">Admin Account</div>
                    </div>
                </div>
                <div class="dropdown-divider"></div>
                <div class="dropdown-logout" id="dropdownLogout">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    Logout
                </div>
            </div>
        </div>
    </div>

    <div class="billing-layout">

        <!-- LEFT: Product Grid -->
        <div class="left-panel">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('Skincare', this)">Skincare</button>
                <button class="tab-btn" onclick="switchTab('Makeup', this)">Makeup</button>
                <button class="tab-btn" onclick="switchTab('Hair Care', this)">Hair Care</button>
            </div>
            <div class="search-wrap">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Search Products" oninput="filterProducts()">
            </div>
            <div class="product-grid" id="productGrid"></div>
        </div>

        <!-- RIGHT: Current Bill -->
        <div class="bill-panel">
            <div class="bill-title">Current Bill</div>
            <div class="bill-items" id="billItems">
                <div class="bill-empty">No items added yet.<br>Click "Add" to start billing.</div>
            </div>
            <div class="bill-divider"></div>
            <div class="bill-row"><span>Subtotal</span><span id="subtotalVal">NRP 0</span></div>
            <div class="bill-row"><span>Tax (13%)</span><span>13%</span></div>
            <div class="bill-row"><span>Rounded Off</span><span id="roundedVal">NRP 0</span></div>
            <div class="bill-row total"><span>Total</span><span id="totalVal">NRP 0</span></div>
            <div class="bill-actions">
                <button class="icon-btn" id="editBtn" title="Edit Quantities" onclick="toggleEdit()">✏️</button>
                <button class="icon-btn" title="Clear All" onclick="clearBill()">🗑️</button>
                <button class="generate-btn" id="generateBtn" onclick="generateBill()" disabled>Generate Bill</button>
            </div>
        </div>

    </div>
</main>

<script src="auth.js"></script>
<script src="billing.js"></script>
</body>
</html>
